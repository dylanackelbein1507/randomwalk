<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OPS // ROUTE INTEL</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background: #020202;
  color: #e6e6e6;
  overflow: hidden;
}

.app {
  display: grid;
  grid-template-columns: 390px 1fr;
  height: 100vh;
}

.sidebar {
  position: relative;
  z-index: 20;
  padding: 24px;
  background:
    linear-gradient(180deg, rgba(10,10,10,0.98), rgba(4,4,4,0.98)),
    repeating-linear-gradient(0deg, rgba(59,130,246,0.04) 0px, rgba(59,130,246,0.04) 1px, transparent 1px, transparent 24px);
  border-right: 1px solid rgba(59,130,246,0.18);
  box-shadow: inset -1px 0 0 rgba(255,255,255,0.03);
}

.header {
  margin-bottom: 20px;
}

.header h1 {
  font-size: 18px;
  letter-spacing: 3px;
  margin: 0;
  color: #f3f7ff;
}

.header p {
  font-size: 11px;
  color: #7d8ca5;
  margin-top: 6px;
  letter-spacing: 1.5px;
}

.section-label {
  font-size: 10px;
  color: #7d8ca5;
  margin-top: 16px;
  letter-spacing: 2px;
}

input, select, button {
  width: 100%;
  margin-top: 6px;
  padding: 12px;
  background: rgba(8, 10, 15, 0.95);
  border: 1px solid rgba(59,130,246,0.16);
  color: #eef4ff;
  border-radius: 6px;
  font-family: inherit;
  box-sizing: border-box;
}

input:focus, select:focus {
  outline: none;
  border-color: rgba(96,165,250,0.55);
  box-shadow: 0 0 0 1px rgba(96,165,250,0.18), 0 0 20px rgba(59,130,246,0.08);
}

input::placeholder {
  color: #50607d;
}

button {
  margin-top: 10px;
  cursor: pointer;
  background: linear-gradient(90deg,#0b1220,#14346d);
  border: 1px solid rgba(96,165,250,0.45);
  letter-spacing: 1px;
  transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
}

button.secondary {
  background: rgba(8,10,15,0.95);
}

button:hover {
  opacity: 0.92;
  transform: translateY(-1px);
  box-shadow: 0 0 18px rgba(59,130,246,0.12);
}

.card {
  margin-top: 18px;
  padding: 14px;
  border: 1px solid rgba(59,130,246,0.14);
  background: rgba(5,7,10,0.92);
  border-radius: 6px;
  font-size: 12px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}

.map-shell {
  position: relative;
  height: 100%;
  width: 100%;
  background: #030405;
}

#map {
  height: 100%;
  width: 100%;
  filter: grayscale(1) contrast(1.32) brightness(0.76) saturate(0.7);
}

.tactical-grid {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.22;
  z-index: 5;
}

.vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.28) 100%);
  z-index: 6;
}

.crosshair {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 96px;
  height: 96px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 7;
  opacity: 0.45;
}

.crosshair::before,
.crosshair::after {
  content: '';
  position: absolute;
  background: rgba(96,165,250,0.55);
}

.crosshair::before {
  left: 50%;
  top: 0;
  width: 1px;
  height: 100%;
  transform: translateX(-50%);
}

.crosshair::after {
  top: 50%;
  left: 0;
  width: 100%;
  height: 1px;
  transform: translateY(-50%);
}

.crosshair-ring {
  position: absolute;
  inset: 28px;
  border: 1px solid rgba(96,165,250,0.4);
  border-radius: 999px;
}

.hud {
  position: absolute;
  z-index: 10;
  pointer-events: none;
  color: #d9e7ff;
  font-size: 11px;
  letter-spacing: 1.3px;
}

.hud-top-left {
  top: 18px;
  left: 20px;
}

.hud-top-right {
  top: 18px;
  right: 20px;
  text-align: right;
}

.hud-bottom-right {
  bottom: 18px;
  right: 20px;
  text-align: right;
}

.hud-panel {
  background: rgba(3,5,8,0.72);
  border: 1px solid rgba(96,165,250,0.18);
  padding: 10px 12px;
  min-width: 170px;
  backdrop-filter: blur(2px);
}

.hud-title {
  color: #7d8ca5;
  font-size: 10px;
  margin-bottom: 6px;
}

.scan-line {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 8;
  background: linear-gradient(to bottom, transparent 0%, rgba(96,165,250,0.08) 48%, rgba(96,165,250,0.22) 50%, rgba(96,165,250,0.08) 52%, transparent 100%);
  background-size: 100% 180px;
  animation: sweep 7s linear infinite;
  opacity: 0.33;
}

@keyframes sweep {
  from { background-position: 0 -180px; }
  to { background-position: 0 100vh; }
}

.landmark {
  margin-top: 10px;
  border-top: 1px solid rgba(96,165,250,0.12);
  padding-top: 10px;
}

.coords {
  font-size: 10px;
  color: #6f84aa;
  margin-top: 4px;
}

.leaflet-control-zoom a {
  background: rgba(5,7,10,0.92) !important;
  color: #dce8ff !important;
  border-bottom: 1px solid rgba(96,165,250,0.16) !important;
}

.leaflet-control-zoom {
  border: 1px solid rgba(96,165,250,0.16) !important;
  box-shadow: none !important;
}

@media (max-width: 980px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }

  .sidebar {
    max-height: 45vh;
    overflow-y: auto;
  }
}
</style>
</head>

<body>
<div class="app">

<div class="sidebar">

<div class="header">
  <h1>OPS // ROUTE INTEL</h1>
  <p>FIELD NAVIGATION SYSTEM</p>
</div>

<div class="section-label">MISSION PARAMETERS</div>
<input id="distance" type="number" value="2.5" />

<div class="section-label">INSERT START LOCATION</div>
<input id="manualLocation" placeholder="e.g. Dallas, TX or address" />

<div class="section-label">ROUTE PROFILE</div>
<select id="mode">
  <option value="balanced">BALANCED</option>
  <option value="park">SCENIC</option>
  <option value="landmarks">INTEL HEAVY</option>
</select>

<button id="locateBtn">ACQUIRE CURRENT POSITION</button>
<button id="generateBtn">GENERATE ROUTE</button>
<button id="rerollBtn" class="secondary">REROLL PATH</button>

<div class="card" id="status">SYSTEM IDLE</div>

<div class="card">
  <button id="loadLandmarksBtn" class="secondary">SCAN FOR INTEL</button>
  <div id="landmarks">NO DATA</div>
</div>

</div>

<div class="map-shell">
<div id="map"></div>
<div class="tactical-grid"></div>
<div class="scan-line"></div>
<div class="crosshair"><div class="crosshair-ring"></div></div>
<div class="vignette"></div>

<div class="hud hud-top-left">
  <div class="hud-panel">
    <div class="hud-title">OP STATUS</div>
    <div id="hudStatus">STANDBY</div>
    <div class="coords" id="hudCoords">LAT ---.---- / LNG ---.----</div>
  </div>
</div>

<div class="hud hud-top-right">
  <div class="hud-panel">
    <div class="hud-title">ENVIRONMENT</div>
    <div id="hudTime">LOCAL 00:00:00</div>
    <div class="coords" id="hudProfile">PROFILE // BALANCED</div>
  </div>
</div>

<div class="hud hud-bottom-right">
  <div class="hud-panel">
    <div class="hud-title">MISSION DATA</div>
    <div id="hudDistance">TARGET -- MI</div>
    <div class="coords" id="hudActual">ACTUAL -- MI</div>
  </div>
</div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

const map = L.map('map').setView([32.7767,-96.7970],13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let startPoint=null;
let routeLayer=null;
let startMarker=null;
let lastRoute=null;

function setStatus(t){
  document.getElementById('status').innerHTML=t;
  document.getElementById('hudStatus').innerHTML=t.replace(/<br>.*/,'');
}

function milesToMeters(m){return m*1609}

function updateHudCoords(lat,lng){
  document.getElementById('hudCoords').textContent = `LAT ${lat.toFixed(4)} / LNG ${lng.toFixed(4)}`;
}

function updateHudMeta(){
  const mode = document.getElementById('mode').value.toUpperCase();
  const dist = parseFloat(document.getElementById('distance').value || '0').toFixed(1);
  document.getElementById('hudProfile').textContent = `PROFILE // ${mode}`;
  document.getElementById('hudDistance').textContent = `TARGET ${dist} MI`;
}

function tickClock(){
  const now = new Date();
  const time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('hudTime').textContent = `LOCAL ${time}`;
}

setInterval(tickClock, 1000);
tickClock();

async function geocode(query){
  setStatus("RESOLVING LOCATION...")
  const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
  const data=await res.json()
  if(!data.length) return null
  return {lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon)}
}

async function route(points){
  const coords=points.map(p=>`${p.lng},${p.lat}`).join(';')
  const r=await fetch(`https://router.project-osrm.org/route/v1/foot/${coords}?overview=full&geometries=geojson`)
  const d=await r.json()
  return d.routes[0]
}

function randomPoint(lat,lng,d){
  const r=6371000
  const br=Math.random()*2*Math.PI
  const lat1=lat*Math.PI/180
  const lng1=lng*Math.PI/180
  const lat2=Math.asin(Math.sin(lat1)*Math.cos(d/r)+Math.cos(lat1)*Math.sin(d/r)*Math.cos(br))
  const lng2=lng1+Math.atan2(Math.sin(br)*Math.sin(d/r)*Math.cos(lat1),Math.cos(d/r)-Math.sin(lat1)*Math.sin(lat2))
  return {lat:lat2*180/Math.PI,lng:lng2*180/Math.PI}
}

async function generate(){
  updateHudMeta();
  setStatus("CALCULATING ROUTE...")

  let manual=document.getElementById('manualLocation').value

  if(manual){
    startPoint=await geocode(manual)
    if(!startPoint){setStatus("LOCATION NOT FOUND");return}
  }

  if(!startPoint){setStatus("NO START POINT ACQUIRED");return}

  const dist=milesToMeters(parseFloat(distance.value))

  const a=randomPoint(startPoint.lat,startPoint.lng,dist/3)
  const b=randomPoint(startPoint.lat,startPoint.lng,dist/3)

  const r=await route([
    startPoint,
    a,
    b,
    startPoint
  ])

  if(routeLayer) map.removeLayer(routeLayer);
  if(startMarker) map.removeLayer(startMarker);

  routeLayer=L.geoJSON(r.geometry,{color:'#60a5fa',weight:4,opacity:0.95}).addTo(map);
  startMarker = L.circleMarker([startPoint.lat,startPoint.lng], {
    radius: 7,
    color: '#dbeafe',
    weight: 1,
    fillColor: '#60a5fa',
    fillOpacity: 0.95
  }).addTo(map);
  map.fitBounds(routeLayer.getBounds(), {padding:[30,30]});

  lastRoute=r;

  const actual = (r.distance/1609).toFixed(2);
  document.getElementById('hudActual').textContent = `ACTUAL ${actual} MI`;
  setStatus(`ROUTE LOCKED<br><span class='coords'>DIST: ${actual} MI</span>`);
}

async function loadIntel(){
  if(!lastRoute) return
  document.getElementById('landmarks').innerHTML="SCANNING..."
}

locateBtn.onclick=()=>{
  setStatus("ACQUIRING GPS SIGNAL...");
  navigator.geolocation.getCurrentPosition(p=>{
    startPoint={lat:p.coords.latitude,lng:p.coords.longitude};
    map.setView([startPoint.lat,startPoint.lng],15);
    updateHudCoords(startPoint.lat, startPoint.lng);
    setStatus(`POSITION LOCKED<br><span class='coords'>${startPoint.lat.toFixed(4)}, ${startPoint.lng.toFixed(4)}</span>`);
  }, () => {
    setStatus('GPS ACQUISITION FAILED');
  });
}

document.getElementById('distance').addEventListener('input', updateHudMeta);
document.getElementById('mode').addEventListener('change', updateHudMeta);

generateBtn.onclick=generate;
loadLandmarksBtn.onclick=loadIntel;
updateHudMeta();

</script>
</body>
</html>
